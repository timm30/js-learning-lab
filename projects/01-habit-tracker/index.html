<html>
  <head>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <h1>Daily Habit Tracker</h1>

      <h2>Water 💧</h2>
      <p id="water-count">0</p>
      <button onclick="incrementWater()">+1 Water</button>

      <h2>Study 📚</h2>
      <p id="study-count">0</p>
      <button onclick="incrementStudy()">+1 Study</button>

      <h2>Exercise 💪</h2>
      <p id="exercise-count">0</p>
      <button onclick="incrementExercise()">+1 Exercise</button>

      <br /><br />

      <button id="save-btn" onclick="save()">SAVE DAY</button>
      <p id="log-el">Previous days:</p>
    </div>
    <script src="index.js"></script>
  </body>
</html>
