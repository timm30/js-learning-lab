<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="app">
      <section class="content">
        <p class="eyebrow">Password Generator</p>

        <h1>
          Generate a <br />
          <span>random password</span>
        </h1>

        <p class="subtitle">Never use an insecure password again.</p>

        <button onclick="generatePasswords()">Generate passwords</button>

        <div class="divider"></div>

        <section class="password-row">
          <div class="password-box" id="password-one"></div>
          <div class="password-box" id="password-two"></div>
        </section>
      </section>
    </main>
  </body>
</html>
