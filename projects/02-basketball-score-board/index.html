<html>
<head>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">

        <!-- HOME -->
        <div class="scoreboard" id="home-board">
            <h3>HOME</h3>
            <div class="score" id="home-score">0</div>
            <div class="buttons">
                <button onclick="addHome(1)">+1</button>
                <button onclick="addHome(2)">+2</button>
                <button onclick="addHome(3)">+3</button>
            </div>
        </div>

        <!-- GUEST -->
        <div class="scoreboard" id="guest-board">
            <h3>GUEST</h3>
            <div class="score" id="guest-score">0</div>
            <div class="buttons">
                <button onclick="addGuest(1)">+1</button>
                <button onclick="addGuest(2)">+2</button>
                <button onclick="addGuest(3)">+3</button>
            </div>
        </div>

    </div>

        <!-- ✅ Reset Button -->
    <div class="reset-container">
        <button onclick="resetScore()">NEW GAME</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
